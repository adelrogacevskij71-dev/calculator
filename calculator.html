<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Калькулятор стоимости</title>
  <style>
    @font-face {
      font-family: 'YS Text';
      src: url('https://yastatic.net/s3/home/fonts/ys/1/text-regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'YS Text';
      src: url('https://yastatic.net/s3/home/fonts/ys/1/text-medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'YS Text';
      src: url('https://yastatic.net/s3/home/fonts/ys/1/text-bold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --purple: #6d72ed;
      --purple-light: #8387f6;
      --blue: #9fbbef;
      --bg: #f1f5fb;
      --white: #ffffff;
      --black: #101225;
      --muted: rgba(16, 18, 37, 0.68);
      --border: rgba(109, 114, 237, 0.18);
      --shadow: 0 24px 70px rgba(33, 37, 117, 0.14);
    }

    * {
      box-sizing: border-box;
      font-family: 'YS Text', 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      color: var(--black);
      padding: 0;
    }

    .calculator_box {
      max-width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .calculator_field {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: clamp(20px, 3vw, 30px);
      box-shadow: var(--shadow);
    }

    .calculator_label {
      display: block;
      margin-bottom: 12px;
      color: var(--purple);
      font-weight: 700;
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.2;
    }

    .calculator_input,
    .calculator_output {
      width: 100%;
      height: 60px;
      border: 2px solid rgba(109, 114, 237, 0.18);
      border-radius: 25px;
      padding: 0 20px;
      background: #f8faff;
      outline: none;
      color: var(--black);
      font-weight: 700;
      font-size: clamp(24px, 3.5vw, 36px);
      line-height: 1;
    }

    .calculator_input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 6px rgba(109, 114, 237, 0.10);
    }

    .calculator_output {
      background: linear-gradient(311deg, #9fbbef 0%, #97afef 18.97%, #808eee 47.84%, #747ced 71.55%, #6d72ed 100%);
      border-color: transparent;
      color: #fff;
    }

    @media (max-width: 600px) {
      .calculator_box {
        grid-template-columns: 1fr;
      }
      
      .calculator_field {
        border-radius: 30px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="calculator_box">
    <div class="calculator_field">
      <label class="calculator_label" for="contractCount">Количество договоров</label>
      <input class="calculator_input" id="contractCount" type="number" min="1" step="1" inputmode="numeric" placeholder="">
    </div>

    <div class="calculator_field">
      <label class="calculator_label" for="totalSum">Сумма</label>
      <input class="calculator_output" id="totalSum" type="text" readonly placeholder="">
    </div>
  </div>

  <script>
    // calculator.js - Калькулятор стоимости документооборота
    (function() {
      'use strict';
      
      function formatCurrency(amount) {
        return new Intl.NumberFormat('ru-RU', {
          style: 'currency',
          currency: 'RUB',
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }).format(amount);
      }

      function calculateCost() {
        var input = document.getElementById('contractCount');
        var output = document.getElementById('totalSum');
        
        if (!input || !output) return;
        
        var value = input.value.replace(/[^0-9]/g, '');
        
        if (value === '' || value === '0') {
          output.value = '';
          return;
        }
        
        var n = parseInt(value, 10);
        
        if (isNaN(n) || n <= 0) {
          output.value = '';
          return;
        }
        
        var m;
        if (n >= 3) {
          m = 50;
        } else if (n >= 2) {
          m = 60;
        } else {
          m = 70;
        }
        
        var v = n * m * 4.75 * 1.68 * 1.15 * 1.32;
        output.value = formatCurrency(v);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initCalculator);
      } else {
        initCalculator();
      }

      function initCalculator() {
        var input = document.getElementById('contractCount');
        
        if (!input) return;
        
        input.addEventListener('input', calculateCost);
        input.addEventListener('change', calculateCost);
        
        if (input.value) {
          calculateCost();
        }
      }
    })();
  </script>
</body>
</html>
